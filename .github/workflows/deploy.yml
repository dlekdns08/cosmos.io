name: Deploy (self-hosted docker)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-self-hosted
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pre-clean root-owned leftovers (legacy bind mount)
        shell: bash
        run: |
          set -e
          if [ -d "$GITHUB_WORKSPACE/data" ]; then
            echo "Removing $GITHUB_WORKSPACE/data"
            if ! rm -rf "$GITHUB_WORKSPACE/data" 2>/dev/null; then
              echo "rm denied — using docker (root) to clean"
              docker run --rm -v "$GITHUB_WORKSPACE:/work" busybox rm -rf /work/data
            fi
          fi

      - uses: actions/checkout@v4

      - name: Build & restart container
        run: |
          docker compose up -d --build --remove-orphans
          docker image prune -f

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:5174/api/leaderboard > /dev/null; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become healthy"
          docker compose logs --tail 200 cosmos || true
          exit 1
