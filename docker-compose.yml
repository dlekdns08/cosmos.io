services:
  cosmos:
    build: .
    image: cosmos:latest
    container_name: cosmos
    restart: unless-stopped
    ports:
      - "5174:3000"
    volumes:
      - ./data:/data
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: production
      COSMOS_DB: /data/cosmos.db
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/leaderboard').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
