<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>COSMOS — 우주의 진화</title>
  <style>
    :root {
      --bg: #050616;
      --panel: #0d1130;
      --text: #e7ecff;
      --dim: #8c93b8;
      --accent: #7f4dff;
      --warn: #ff5a5a;
      --live: #ff4d6d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, #11142e 0%, #050616 70%);
      color: var(--text);
      font-family: -apple-system, "SF Pro Display", "Pretendard", "Noto Sans KR", sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
    }
    .layout {
      display: flex;
      gap: 16px;
      align-items: stretch;
      max-height: calc(100vh - 60px);
    }
    .stage {
      position: relative;
      aspect-ratio: 480 / 720;
      max-height: calc(100vh - 80px);
      max-width: calc(100vw - 280px);
      display: flex;
      flex-direction: column;
    }
    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: rgba(13,17,48,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(127,77,255,0.15);
      border-radius: 12px 12px 0 0;
      gap: 12px;
    }
    .hud .col { display: flex; flex-direction: column; gap: 2px; }
    .hud .label { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; }
    .hud .value { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
    .hud .combo {
      font-size: 14px;
      font-weight: 700;
      color: #ffe066;
      opacity: 0;
      transition: opacity 0.15s;
      text-shadow: 0 0 8px rgba(255,224,102,0.6);
    }
    .hud .next-wrap { display: flex; align-items: center; gap: 8px; }
    canvas#next {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(127,77,255,0.2);
      border-radius: 10px;
    }
    canvas#game {
      display: block;
      flex: 1;
      width: 100%;
      height: 100%;
      background: #050616;
      border: 1px solid rgba(127,77,255,0.2);
      border-top: none;
      border-radius: 0 0 12px 12px;
      touch-action: none;
      cursor: pointer;
    }
    button.bigbang {
      position: absolute;
      right: 10px;
      bottom: 14px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #ff4d6d, #ffa64d);
      border: none;
      color: white;
      font-weight: 700;
      font-size: 14px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(255,77,109,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.1s;
    }
    button.bigbang.show { opacity: 1; pointer-events: auto; }
    button.bigbang:active { transform: scale(0.95); }
    button.bigbang:disabled {
      background: #444;
      box-shadow: none;
      cursor: not-allowed;
    }
    #toasts {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      z-index: 5;
    }
    .toast {
      padding: 8px 16px;
      background: rgba(13,17,48,0.9);
      border: 1px solid rgba(127,77,255,0.6);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
      text-shadow: 0 0 8px rgba(127,77,255,0.8);
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(-8px); } }
    #gameover {
      position: absolute;
      inset: 0;
      background: rgba(5,6,22,0.85);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border-radius: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
      z-index: 10;
    }
    #gameover.show { opacity: 1; pointer-events: auto; }
    #gameover h2 {
      font-size: 32px;
      letter-spacing: 0.3em;
      background: linear-gradient(135deg, #7f4dff, #ff4d6d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #gameover .row { display: flex; gap: 24px; font-size: 14px; color: var(--dim); }
    #gameover .row b { display: block; font-size: 24px; color: var(--text); margin-top: 4px; }
    #gameover .actions { display: flex; gap: 12px; margin-top: 12px; }
    #gameover button {
      padding: 12px 28px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(127,77,255,0.6);
    }
    button.ghost {
      background: transparent !important;
      border: 1px solid rgba(127,77,255,0.5) !important;
      color: var(--text) !important;
      box-shadow: none !important;
    }

    /* Nebula panel */
    #nebula {
      position: fixed;
      inset: 0;
      background: rgba(5,6,22,0.92);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 20;
      padding: 20px;
    }
    #nebula.show { opacity: 1; pointer-events: auto; }
    #nebula .nebula-card {
      width: 100%;
      max-width: 540px;
      max-height: 80vh;
      background: rgba(13,17,48,0.9);
      border: 1px solid rgba(127,77,255,0.3);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #nebula header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(127,77,255,0.15);
    }
    #nebula header h2 {
      font-size: 16px;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, #7f4dff, #ff4d6d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #nebula header button { padding: 6px 14px; font-size: 12px; }
    .nebula-summary {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(127,77,255,0.1);
    }
    .nebula-summary .label { font-size: 11px; color: var(--dim); letter-spacing: 0.15em; }
    .nebula-summary .value { font-size: 28px; font-weight: 700; color: #ff4dc4; text-shadow: 0 0 16px rgba(255,77,196,0.5); }
    .nebula-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .nebula-node {
      display: grid;
      grid-template-columns: 76px 1fr 60px;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      align-items: center;
      opacity: 0.45;
      transition: opacity 0.2s;
    }
    .nebula-node.unlocked { opacity: 1; background: rgba(127,77,255,0.12); border: 1px solid rgba(127,77,255,0.3); margin: 4px 0; }
    .nebula-np { font-size: 13px; font-weight: 700; color: var(--accent); }
    .nebula-name { font-size: 13px; font-weight: 700; }
    .nebula-desc { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .nebula-state { font-size: 11px; color: var(--dim); text-align: right; letter-spacing: 0.1em; }
    .nebula-node.unlocked .nebula-state { color: #6effa0; }
    .credit {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.2em;
      text-align: center;
    }

    /* Charge panel */
    .charge-panel {
      position: absolute;
      left: 10px;
      bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 156px;
      pointer-events: none;
    }
    .charge-gauge {
      position: relative;
      height: 12px;
      background: rgba(13,17,48,0.7);
      border: 1px solid rgba(127,77,255,0.3);
      border-radius: 999px;
      overflow: hidden;
      pointer-events: none;
    }
    .charge-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7f4dff, #ff4dc4);
      transition: width 0.2s ease-out;
      box-shadow: 0 0 10px rgba(127,77,255,0.6);
    }
    .charge-gauge.ready .charge-fill {
      animation: chargePulse 1s ease-in-out infinite;
    }
    @keyframes chargePulse {
      0%, 100% { box-shadow: 0 0 8px rgba(127,77,255,0.6); }
      50% { box-shadow: 0 0 20px rgba(255,77,196,0.95); }
    }
    .charge-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: #fff;
      font-weight: 700;
      text-shadow: 0 0 4px rgba(0,0,0,0.7);
    }
    .charge-buttons {
      display: flex;
      gap: 4px;
      pointer-events: auto;
    }
    .charge-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 2px;
      gap: 1px;
      background: rgba(13,17,48,0.7);
      border: 1px solid rgba(127,77,255,0.2);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.15s, border-color 0.15s, transform 0.1s;
    }
    .charge-btn:not(:disabled) { opacity: 1; }
    .charge-btn:not(:disabled):hover { border-color: rgba(127,77,255,0.6); }
    .charge-btn:active:not(:disabled) { transform: scale(0.95); }
    .charge-btn.selected {
      background: linear-gradient(135deg, rgba(127,77,255,0.4), rgba(255,77,196,0.3));
      border-color: #ff4dc4;
      box-shadow: 0 0 14px rgba(127,77,255,0.5);
    }
    .charge-btn .key {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 0.1em;
    }
    .charge-btn .name {
      font-size: 11px;
      font-weight: 700;
    }
    .charge-btn:disabled { cursor: not-allowed; }

    /* Side column */
    .side {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .daily {
      background: rgba(13,17,48,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(127,77,255,0.15);
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .daily header {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid rgba(127,77,255,0.15);
    }
    .daily header h3 {
      font-size: 12px;
      letter-spacing: 0.2em;
    }
    .daily .streak {
      font-size: 11px;
      color: #ffaf66;
    }
    .daily-list { padding: 6px 8px; }
    .daily-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      font-size: 11px;
    }
    .daily-row .check {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(127,77,255,0.5);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .daily-row.done .check {
      background: #6effa0;
      border-color: #6effa0;
      box-shadow: 0 0 8px rgba(110,255,160,0.6);
    }
    .daily-row.done .label { color: var(--dim); text-decoration: line-through; }
    .daily-row .label { flex: 1; }
    .daily-row .prog { color: var(--dim); font-size: 10px; }

    /* Leaderboard */
    .leaderboard {
      flex: 1;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      background: rgba(13,17,48,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(127,77,255,0.15);
      border-radius: 12px;
      overflow: hidden;
    }
    .leaderboard header {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid rgba(127,77,255,0.15);
    }
    .leaderboard header h3 {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--text);
    }
    .leaderboard header .status {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #6effa0;
    }
    .leaderboard header .status.off {
      color: var(--warn);
    }
    .leaderboard .list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
    }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 8px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .lb-row:not(:last-child) {
      border-bottom: 1px solid rgba(127,77,255,0.06);
    }
    .lb-row.you {
      background: rgba(127,77,255,0.18);
      border: 1px solid rgba(127,77,255,0.5);
    }
    .lb-row.alive .lb-name::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--live);
      border-radius: 50%;
      margin-left: 6px;
      box-shadow: 0 0 8px var(--live);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .lb-rank {
      width: 32px;
      font-size: 12px;
      font-weight: 700;
      color: var(--dim);
      text-align: center;
    }
    .lb-main {
      flex: 1;
      min-width: 0;
    }
    .lb-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-meta {
      font-size: 11px;
      color: var(--dim);
      margin-top: 2px;
    }
    .lb-live {
      display: inline-block;
      font-size: 9px;
      padding: 1px 5px;
      background: var(--live);
      color: white;
      border-radius: 4px;
      margin-right: 4px;
      letter-spacing: 0.1em;
      font-weight: 700;
    }

    @media (max-width: 800px) {
      .layout { flex-direction: column; align-items: center; }
      .stage { max-width: 100vw; max-height: calc(100vh - 380px); }
      .side { width: 100%; max-width: 480px; flex-direction: row; max-height: 200px; }
      .daily, .leaderboard { width: 50%; max-height: 200px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="layout">
      <div class="stage">
        <div class="hud">
          <div class="col">
            <span class="label">SCORE</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="combo" id="combo"></div>
          <div class="col" style="align-items: flex-end;">
            <span class="label">BEST · <span id="best">0</span></span>
            <div class="next-wrap">
              <span class="label">NEXT</span>
              <canvas id="next"></canvas>
            </div>
          </div>
        </div>
        <canvas id="game"></canvas>
        <div id="charge-panel" class="charge-panel">
          <div class="charge-gauge">
            <div class="charge-fill" id="charge-fill"></div>
            <div class="charge-label" id="charge-label">CHARGE 0%</div>
          </div>
          <div class="charge-buttons">
            <button class="charge-btn" data-kind="charged" id="charge-btn-charged" disabled>
              <span class="key">1</span><span class="name">충전</span>
            </button>
            <button class="charge-btn" data-kind="slow" id="charge-btn-slow" disabled>
              <span class="key">2</span><span class="name">슬로우</span>
            </button>
            <button class="charge-btn" data-kind="attract" id="charge-btn-attract" disabled>
              <span class="key">3</span><span class="name">인력</span>
            </button>
          </div>
        </div>
        <button id="bigbang" class="bigbang">빅뱅 (1)</button>
        <div id="toasts"></div>
        <div id="gameover">
          <h2>COSMOS</h2>
          <div class="row">
            <div>SCORE<b id="finalScore">0</b></div>
            <div>BEST<b id="finalBest">0</b></div>
            <div>+NP<b id="finalNp">0</b></div>
          </div>
          <div class="actions">
            <button id="restart">다시 시작</button>
            <button id="open-nebula" class="ghost">성운 보기</button>
            <button id="share-card" class="ghost">이미지 저장</button>
          </div>
        </div>
        <div id="nebula">
          <div class="nebula-card">
            <header>
              <h2>성운 진행도</h2>
              <button id="nebula-close" class="ghost">닫기</button>
            </header>
            <div class="nebula-summary">
              <span class="label">누적 NP</span>
              <span class="value" id="nebula-np">0</span>
            </div>
            <div class="nebula-list" id="nebula-track"></div>
          </div>
        </div>
      </div>
      <div class="side">
        <aside class="daily">
          <header>
            <h3>오늘의 별자리</h3>
            <span class="streak" id="daily-streak">🔥 0</span>
          </header>
          <div class="daily-list" id="daily-list"></div>
        </aside>
        <aside class="leaderboard">
          <header>
            <h3>리더보드</h3>
            <span class="status" id="leaderboard-status">연결 중...</span>
          </header>
          <div class="list" id="leaderboard-list"></div>
        </aside>
      </div>
    </div>
    <div class="credit">COSMOS — 우주의 진화를 손바닥 안에서</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
